<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../content/styles/site.css">
    <link href="https://use.fontawesome.com/releases/v5.0.7/css/all.css" rel="stylesheet">
    <title>Gift Adventure</title>
</head>

<body>
    <header>
        <nav>
            <a href="">
                <span class="logo">Gift Adventure</span>
            </a>
            <ul class="navigation">
                <li><a href="/">Home</a></li>
                <li><a href="/adventures/add-Location">Add Location</a></li>
                <li><a href="/adventures/add-cat">Add Adventure</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <form action="#" method="" class="adventure-form">
            <h2>Book</h2>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/Cappadocia_balloon_trip%2C_Ortahisar_Castle_%2811893715185%29.jpg/330px-Cappadocia_balloon_trip%2C_Ortahisar_Castle_%2811893715185%29.jpg" alt="">
            <label for="name">Name</label>
            <input type="text" id="name" value="Cappadocia" disabled>
            <label for="description">Description</label>
            <textarea id="description" disabled>Cappadocia is a historical region in Central Anatolia region, Turkey.</textarea>
            <label for="group">Location</label>
            <select id="group" disabled>
                <option value="Fluffy Cat">Turkey</option>
            </select>
            <button>BOOK</button>
        </form>
    </main>
</body>


</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../content/styles/site.css">
    <link href="https://use.fontawesome.com/releases/v5.0.7/css/all.css" rel="stylesheet">
    <title>Gift Adventure</title>
</head>

<body>
    <header>
        <nav>
            <a href="">
                <span class="logo">Gift Adventure</span>
            </a>
            <ul class="navigation">
                <li><a href="/">Home</a></li>
                <li><a href="/adventures/add-Location">Add Location</a></li>
                <li><a href="/adventures/add-cat">Add Adventure</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <form action="#" method="" class="adventure-form" enctype="multipart/form-data">
            <h2>Add Adventure</h2>
            <label for="name">Name</label>
            <input name="name" type="text" id="name">
            <label for="description">Description</label>
            <textarea name="description" id="description"></textarea>
            <label for="image">Image</label>
            <input name="upload" type="file" id="image">
            <label for="group">Location</label>
            <select name="location" id="group">
                <option value="Egipt">Egipt</option>
				<option value="Spain">Spain</option>
				<option value="Chile">Chile</option>
            </select>
            <button type="submit">Add Adventure</button>
        </form>
    </main>
</body>

</html>
